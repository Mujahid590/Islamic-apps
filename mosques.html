<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ইসলামিক অ্যাপস | মসজিদ খুঁজুন</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mosques.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- নেভিগেশন বার -->
        <nav class="top-navbar">
            <div class="nav-brand">
                <span class="brand-icon">﷽</span>
                <h1>ইসলামিক অ্যাপস</h1>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i></a>
                <a href="quran.html" class="nav-link"><i class="fas fa-quran"></i></a>
                <a href="tasbih.html" class="nav-link"><i class="fas fa-fingerprint"></i></a>
                <a href="qibla.html" class="nav-link"><i class="fas fa-compass"></i></a>
                <a href="mosques.html" class="nav-link active"><i class="fas fa-mosque"></i></a>
            </div>
            <div class="nav-actions">
                <a href="calendar.html" class="icon-btn"><i class="fas fa-calendar-alt"></i></a>
                <button class="icon-btn" id="settingsNavBtn"><i class="fas fa-cog"></i></button>
            </div>
        </nav>

        <!-- সেটিংস প্যানেল -->
        <div class="settings-panel" id="settingsPanel">
            <div class="settings-header">
                <h3><i class="fas fa-sliders-h"></i> সেটিংস</h3>
                <button class="close-settings" id="closeSettingsBtn">&times;</button>
            </div>
            <div class="settings-body">
                <div class="setting-item">
                    <label><i class="fas fa-palette"></i> থিম</label>
                    <div class="theme-controls">
                        <button class="theme-btn active" data-theme="light">লাইট</button>
                        <button class="theme-btn" data-theme="dark">ডার্ক</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- মূল কন্টেন্ট -->
        <main class="main-content">
            <div class="page-header">
                <h1>নিকটস্থ মসজিদ</h1>
                <p class="location-badge"><i class="fas fa-mosque"></i> আপনার এলাকার মসজিদ খুঁজুন</p>
            </div>

            <div class="search-area">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="locationSearch" placeholder="জেলা বা এলাকার নাম... (যেমন: গুলশান, মিরপুর)">
                    <button id="searchLocationBtn" class="search-btn">খুঁজুন</button>
                </div>
                <button id="getNearbyMosques" class="btn-primary" style="width: 100%; margin-top: 0.5rem;">
                    <i class="fas fa-location-dot"></i> আমার কাছের মসজিদ
                </button>
            </div>

            <div id="mosquesMap" class="map-view"></div>
            
            <div class="section-title" style="margin-top: 1rem;">
                <i class="fas fa-list"></i>
                <h2>মসজিদের তালিকা</h2>
            </div>
            <div class="mosques-list scrollable" id="mosquesList">
                <div class="loading"><i class="fas fa-spinner fa-pulse"></i> লোড হচ্ছে...</div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script src="js/mosques.js"></script>
</body>
</html>
