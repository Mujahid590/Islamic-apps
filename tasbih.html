<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ইসলামিক অ্যাপস | তাসবিহ</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/tasbih.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <nav class="top-navbar">
            <div class="nav-brand">
                <span class="brand-icon">﷽</span>
                <h1>ইসলামিক অ্যাপস</h1>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i></a>
                <a href="quran.html" class="nav-link"><i class="fas fa-quran"></i></a>
                <a href="tasbih.html" class="nav-link active"><i class="fas fa-fingerprint"></i></a>
                <a href="qibla.html" class="nav-link"><i class="fas fa-compass"></i></a>
                <a href="mosques.html" class="nav-link"><i class="fas fa-mosque"></i></a>
            </div>
            <div class="nav-actions">
                <a href="calendar.html" class="icon-btn"><i class="fas fa-calendar-alt"></i></a>
                <button class="icon-btn" id="settingsNavBtn"><i class="fas fa-cog"></i></button>
            </div>
        </nav>

        <div class="settings-panel" id="settingsPanel">
            <div class="settings-header">
                <h3><i class="fas fa-sliders-h"></i> সেটিংস</h3>
                <button class="close-settings" id="closeSettingsBtn">&times;</button>
            </div>
            <div class="settings-body">
                <div class="setting-item">
                    <label><i class="fas fa-palette"></i> থিম</label>
                    <div class="theme-controls">
                        <button class="theme-btn active" data-theme="light">লাইট</button>
                        <button class="theme-btn" data-theme="dark">ডার্ক</button>
                    </div>
                </div>
            </div>
        </div>

        <main class="main-content">
            <div class="page-header">
                <h1>ডিজিটাল তাসবিহ</h1>
            </div>
            <div class="tasbih-main">
                <div class="tasbih-counter">
                    <div class="tasbih-number" id="tasbihNumber">০</div>
                    <div class="tasbih-label" id="tasbihLabel">সুবহানাল্লাহ</div>
                </div>
                <div class="action-buttons">
                    <button class="btn-primary" id="countBtn"><i class="fas fa-plus-circle"></i> গণনা (+১)</button>
                    <button class="btn-secondary" id="resetBtn"><i class="fas fa-undo-alt"></i> রিসেট</button>
                </div>
                <div class="section-title"><i class="fas fa-bolt"></i><h2>দ্রুত গণনা</h2></div>
                <div class="preset-buttons">
                    <button class="preset-btn" data-count="33">৩৩ বার</button>
                    <button class="preset-btn" data-count="34">৩৪ বার</button>
                    <button class="preset-btn" data-count="99">৯৯ বার</button>
                    <button class="preset-btn" data-count="100">১০০ বার</button>
                </div>
                <div class="section-title"><i class="fas fa-star-of-life"></i><h2>তাসবিহ নির্বাচন</h2></div>
                <div class="type-buttons">
                    <button class="type-btn active" data-type="subhanallah"><span class="arabic">سُبْحَانَ اللَّهِ</span><span> সুবহানাল্লাহ</span></button>
                    <button class="type-btn" data-type="alhamdulillah"><span class="arabic">الْحَمْدُ لِلَّهِ</span><span> আলহামদুলিল্লাহ</span></button>
                    <button class="type-btn" data-type="allahuakbar"><span class="arabic">اللَّهُ أَكْبَرُ</span><span> আল্লাহু আকবার</span></button>
                </div>
                <div class="section-title"><i class="fas fa-history"></i><h2>ইতিহাস</h2></div>
                <div class="history-list scrollable" id="historyList"><p class="empty">কোনো ইতিহাস নেই</p></div>
            </div>
        </main>
    </div>
    <script src="js/main.js"></script>
    <script src="js/tasbih.js"></script>
</body>
</html>
