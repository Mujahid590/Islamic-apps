<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ইসলামিক অ্যাপস | কিবলা দিক নির্দেশক</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/qibla.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- নেভিগেশন বার -->
        <nav class="top-navbar">
            <div class="nav-brand">
                <span class="brand-icon">﷽</span>
                <h1>ইসলামিক অ্যাপস</h1>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i></a>
                <a href="quran.html" class="nav-link"><i class="fas fa-quran"></i></a>
                <a href="tasbih.html" class="nav-link"><i class="fas fa-fingerprint"></i></a>
                <a href="qibla.html" class="nav-link active"><i class="fas fa-compass"></i></a>
                <a href="mosques.html" class="nav-link"><i class="fas fa-mosque"></i></a>
            </div>
            <div class="nav-actions">
                <a href="calendar.html" class="icon-btn"><i class="fas fa-calendar-alt"></i></a>
                <button class="icon-btn" id="settingsNavBtn"><i class="fas fa-cog"></i></button>
            </div>
        </nav>

        <!-- সেটিংস প্যানেল -->
        <div class="settings-panel" id="settingsPanel">
            <div class="settings-header">
                <h3><i class="fas fa-sliders-h"></i> সেটিংস</h3>
                <button class="close-settings" id="closeSettingsBtn">&times;</button>
            </div>
            <div class="settings-body">
                <div class="setting-item">
                    <label><i class="fas fa-palette"></i> থিম</label>
                    <div class="theme-controls">
                        <button class="theme-btn active" data-theme="light">লাইট</button>
                        <button class="theme-btn" data-theme="dark">ডার্ক</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- মূল কন্টেন্ট -->
        <main class="main-content">
            <div class="page-header">
                <h1>কিবলা দিক নির্দেশক</h1>
                <p class="location-badge"><i class="fas fa-kaaba"></i> কাবার দিক নির্ণয় করুন</p>
            </div>

            <div class="qibla-container">
                <div class="compass-wrapper">
                    <canvas id="compassCanvas" width="260" height="260"></canvas>
                </div>

                <div class="info-grid">
                    <div class="info-item">
                        <i class="fas fa-location-dot"></i>
                        <div>
                            <span>আপনার অবস্থান</span>
                            <strong id="userLocationInfo">লোড হচ্ছে...</strong>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-arrow-right"></i>
                        <div>
                            <span>কিবলার দিক</span>
                            <strong id="qiblaDirection">--°</strong>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-compass"></i>
                        <div>
                            <span>বর্তমান দিক</span>
                            <strong id="currentDirection">--°</strong>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-check-circle"></i>
                        <div>
                            <span>অবস্থা</span>
                            <strong id="statusText">সেন্সর চালু হচ্ছে...</strong>
                        </div>
                    </div>
                </div>

                <button class="btn-primary" id="calibrateBtn">
                    <i class="fas fa-sync-alt"></i> রিক্যালিব্রেট
                </button>

                <div class="info-note">
                    <i class="fas fa-info-circle"></i> সঠিক দিক নির্ণয়ের জন্য ফোনটি সমতল রাখুন এবং চারপাশে ঘোরান
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script src="js/qibla.js"></script>
</body>
</html>
