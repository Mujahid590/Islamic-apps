<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ইসলামিক অ্যাপস | পবিত্র কুরআন</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/quran.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <nav class="top-navbar">
            <div class="nav-brand">
                <span class="brand-icon">﷽</span>
                <h1>ইসলামিক অ্যাপস</h1>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i></a>
                <a href="quran.html" class="nav-link active"><i class="fas fa-quran"></i></a>
                <a href="tasbih.html" class="nav-link"><i class="fas fa-fingerprint"></i></a>
                <a href="qibla.html" class="nav-link"><i class="fas fa-compass"></i></a>
                <a href="mosques.html" class="nav-link"><i class="fas fa-mosque"></i></a>
            </div>
            <div class="nav-actions">
                <a href="calendar.html" class="icon-btn"><i class="fas fa-calendar-alt"></i></a>
                <button class="icon-btn" id="settingsNavBtn"><i class="fas fa-cog"></i></button>
            </div>
        </nav>

        <div class="settings-panel" id="settingsPanel">
            <div class="settings-header">
                <h3><i class="fas fa-sliders-h"></i> সেটিংস</h3>
                <button class="close-settings" id="closeSettingsBtn">&times;</button>
            </div>
            <div class="settings-body">
                <div class="setting-item">
                    <label><i class="fas fa-palette"></i> থিম</label>
                    <div class="theme-controls">
                        <button class="theme-btn active" data-theme="light">লাইট</button>
                        <button class="theme-btn" data-theme="dark">ডার্ক</button>
                    </div>
                </div>
                <div class="setting-item">
                    <label><i class="fas fa-text-height"></i> আয়াতের সাইজ</label>
                    <div class="font-size-stepper">
                        <button id="decreaseFont">−</button>
                        <span id="fontSizeValue">16</span>
                        <button id="increaseFont">+</button>
                    </div>
                </div>
            </div>
        </div>

        <main class="main-content quran-main">
            <div class="reading-progress">
                <i class="fas fa-history"></i>
                <span>শেষ পড়া: <strong id="lastReadInfo">আল-ফাতিহা, আয়াত ১</strong></span>
                <button id="continueReadingBtn" class="continue-btn">পড়া চালিয়ে যান</button>
            </div>

            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="surahSearch" placeholder="সূরা অনুসন্ধান...">
                <span id="searchCount" class="search-count">১১৪ টি সূরা</span>
            </div>

            <div class="two-columns">
                <div class="sidebar">
                    <div class="sidebar-header">
                        <span><i class="fas fa-list"></i> সূরা তালিকা</span>
                        <span id="totalSurahCount">১১৪</span>
                    </div>
                    <div class="sidebar-list scrollable" id="surahList">
                        <div class="loading">লোড হচ্ছে...</div>
                    </div>
                </div>

                <div class="viewer scrollable" id="ayahViewer">
                    <div class="surah-header">
                        <h2>الفاتحة</h2>
                        <p>আল-ফাতিহা • ৭ আয়াত</p>
                    </div>
                    <div class="ayah-card">
                        <div class="ayah-number">আয়াত: ১</div>
                        <div class="ayah-arabic">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
                        <div class="ayah-translation">শুরু করছি আল্লাহর নামে যিনি পরম করুণাময় ও অতি দয়ালু।</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script src="js/quran.js"></script>
</body>
</html>
