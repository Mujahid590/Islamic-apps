<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ইসলামিক অ্যাপস | নামাজের সময়সূচি</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- নেভিগেশন বার -->
        <nav class="top-navbar">
            <div class="nav-brand">
                <span class="brand-icon">﷽</span>
                <h1>ইসলামিক অ্যাপস</h1>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link active"><i class="fas fa-home"></i></a>
                <a href="quran.html" class="nav-link"><i class="fas fa-quran"></i></a>
                <a href="tasbih.html" class="nav-link"><i class="fas fa-fingerprint"></i></a>
                <a href="qibla.html" class="nav-link"><i class="fas fa-compass"></i></a>
                <a href="mosques.html" class="nav-link"><i class="fas fa-mosque"></i></a>
                <a href="calendar.html" class="nav-link"><i class="fas fa-calendar-alt"></i></a>
            </div>
            <div class="nav-actions">
                <button class="icon-btn" id="settingsNavBtn"><i class="fas fa-cog"></i></button>
            </div>
        </nav>

        <!-- সেটিংস প্যানেল -->
        <div class="settings-panel" id="settingsPanel">
            <div class="settings-header">
                <h3><i class="fas fa-sliders-h"></i> সেটিংস</h3>
                <button class="close-settings" id="closeSettingsBtn">&times;</button>
            </div>
            <div class="settings-body">
                <div class="setting-item">
                    <label><i class="fas fa-palette"></i> থিম নির্বাচন করুন</label>
                    <div class="theme-controls">
                        <button class="theme-btn active" data-theme="light">☀️ লাইট মোড</button>
                        <button class="theme-btn" data-theme="dark">🌙 ডার্ক মোড</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- মূল কন্টেন্ট -->
        <main class="main-content">
            <div class="page-header">
                <h1>📿 নামাজের সময়সূচি</h1>
                <p><i class="fas fa-clock"></i> দৈনিক পাঁচ ওয়াক্ত নামাজের সময়</p>
            </div>

            <!-- তথ্য কার্ড -->
            <div class="info-card-row">
                <div class="info-card">
                    <i class="fas fa-clock"></i>
                    <div class="time-display" id="liveClock">--:--:-- --</div>
                </div>
                <div class="info-card next-prayer-card">
                    <i class="fas fa-hourglass-half"></i>
                    <span>পরবর্তী নামাজ: <strong id="nextPrayerName">ফজর</strong></span>
                    <div class="countdown-timer" id="countdownTimer">--:--:--</div>
                </div>
            </div>

            <!-- দৈনিক ৫ ওয়াক্ত নামাজ -->
            <div class="prayer-list" id="prayerTimesList"></div>

            <!-- লিজেন্ড -->
            <div class="legend">
                <span><span class="legend-dot ended"></span> সময় শেষ</span>
                <span><span class="legend-dot active"></span> চলমান</span>
                <span><span class="legend-dot upcoming"></span> বাকি</span>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script>
        // সঠিক নামাজের সময়সূচি
        let prayerSchedule = [
            { 
                id: "fajr",
                nameBn: "ফজর", 
                nameAr: "صلاة الفجر", 
                icon: "fa-cloud-moon",
                start: "05:00 AM", 
                end: "06:15 AM"
            },
            { 
                id: "dhuhr",
                nameBn: "যোহর", 
                nameAr: "صلاة الظهر", 
                icon: "fa-sun",
                start: "12:30 PM", 
                end: "03:45 PM"
            },
            { 
                id: "asr",
                nameBn: "আসর", 
                nameAr: "صلاة العصر", 
                icon: "fa-cloud-sun",
                start: "04:00 PM", 
                end: "05:45 PM"
            },
            { 
                id: "maghrib",
                nameBn: "মাগরিব", 
                nameAr: "صلاة المغرب", 
                icon: "fa-moon",
                start: "06:15 PM", 
                end: "07:15 PM"
            },
            { 
                id: "isha",
                nameBn: "এশা", 
                nameAr: "صلاة العشاء", 
                icon: "fa-stars",
                start: "07:45 PM", 
                end: "11:59 PM"
            }
        ];

        function timeToMinutes(timeStr) {
            let [time, modifier] = timeStr.split(' ');
            let [hours, minutes] = time.split(':').map(Number);
            if (modifier === 'PM' && hours !== 12) hours += 12;
            else if (modifier === 'AM' && hours === 12) hours = 0;
            return hours * 60 + minutes;
        }

        function getCurrentMinutes() {
            let now = new Date();
            return now.getHours() * 60 + now.getMinutes();
        }

        function getStatus(prayerStart, prayerEnd, currentMins) {
            let startMins = timeToMinutes(prayerStart);
            let endMins = timeToMinutes(prayerEnd);
            if (currentMins >= startMins && currentMins < endMins) return "active";
            else if (currentMins >= endMins) return "ended";
            else return "upcoming";
        }

        function getNextPrayer() {
            let currentMins = getCurrentMinutes();
            for (let prayer of prayerSchedule) {
                if (currentMins < timeToMinutes(prayer.start)) return prayer;
            }
            return prayerSchedule[0];
        }

        function renderPrayers() {
            let currentMins = getCurrentMinutes();
            let container = document.getElementById("prayerTimesList");
            if (!container) return;
            container.innerHTML = "";
            
            prayerSchedule.forEach(p => {
                let status = getStatus(p.start, p.end, currentMins);
                let statusText = "", statusClass = "";
                if (status === "active") { statusText = "চলমান"; statusClass = "status-active"; }
                else if (status === "ended") { statusText = "সময় শেষ"; statusClass = "status-ended"; }
                else { statusText = "বাকি"; statusClass = "status-upcoming"; }
                
                container.innerHTML += `
                    <div class="prayer-card ${p.id}">
                        <div class="prayer-info">
                            <div class="prayer-icon">
                                <i class="fas ${p.icon}"></i>
                            </div>
                            <div class="prayer-details">
                                <div class="prayer-name">
                                    <span class="prayer-name-bn">${p.nameBn}</span>
                                    <span class="prayer-name-ar">${p.nameAr}</span>
                                </div>
                                <div class="prayer-times">
                                    <span><i class="fas fa-play-circle"></i> শুরু: ${p.start}</span>
                                    <span><i class="fas fa-stop-circle"></i> শেষ: ${p.end}</span>
                                </div>
                            </div>
                        </div>
                        <div class="status-badge ${statusClass}">${statusText}</div>
                    </div>
                `;
            });
        }

        function startCountdown() {
            setInterval(() => {
                const nextPrayer = getNextPrayer();
                if (nextPrayer) {
                    document.getElementById('nextPrayerName').innerHTML = `${nextPrayer.nameBn} <span style="font-family:'Uthman Taha Naskh';">(${nextPrayer.nameAr})</span>`;
                    
                    let now = new Date();
                    let [time, modifier] = nextPrayer.start.split(' ');
                    let [hours, minutes] = time.split(':').map(Number);
                    if (modifier === 'PM' && hours !== 12) hours += 12;
                    else if (modifier === 'AM' && hours === 12) hours = 0;
                    
                    let prayerTime = new Date();
                    prayerTime.setHours(hours, minutes, 0, 0);
                    if (prayerTime < now) prayerTime.setDate(prayerTime.getDate() + 1);
                    
                    let diff = prayerTime - now;
                    let hoursLeft = Math.floor(diff / (1000 * 60 * 60));
                    let minutesLeft = Math.floor((diff % 3600000) / 60000);
                    let secondsLeft = Math.floor((diff % 60000) / 1000);
                    
                    document.getElementById('countdownTimer').innerHTML = `${hoursLeft.toString().padStart(2,'0')}:${minutesLeft.toString().padStart(2,'0')}:${secondsLeft.toString().padStart(2,'0')}`;
                }
                renderPrayers();
            }, 1000);
        }

        function updateClock() {
            let now = new Date();
            let clockDiv = document.getElementById("liveClock");
            if (clockDiv) {
                let hours = now.getHours();
                let minutes = now.getMinutes();
                let seconds = now.getSeconds();
                let ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12 || 12;
                let banglaDate = now.toLocaleDateString('bn-BD', { weekday: 'long', day: 'numeric', month: 'long' });
                clockDiv.innerHTML = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')} ${ampm}<br><span>${banglaDate}</span>`;
            }
        }

        renderPrayers();
        startCountdown();
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
