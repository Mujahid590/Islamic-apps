<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ইসলামিক অ্যাপস | হোম</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- নেভিগেশন বার - সব পেজের লিংক সহ -->
        <nav class="top-navbar">
            <div class="nav-brand">
                <span class="brand-icon">﷽</span>
                <h1>ইসলামিক অ্যাপস</h1>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link active"><i class="fas fa-home"></i><span>হোম</span></a>
                <a href="namaz.html" class="nav-link"><i class="fas fa-clock"></i><span>নামাজ</span></a>
                <a href="quran.html" class="nav-link"><i class="fas fa-quran"></i><span>কুরআন</span></a>
                <a href="tasbih.html" class="nav-link"><i class="fas fa-fingerprint"></i><span>তাসবিহ</span></a>
                <a href="qibla.html" class="nav-link"><i class="fas fa-compass"></i><span>কিবলা</span></a>
                <a href="mosques.html" class="nav-link"><i class="fas fa-mosque"></i><span>মসজিদ</span></a>
                <a href="calendar.html" class="nav-link"><i class="fas fa-calendar-alt"></i><span>ক্যালেন্ডার</span></a>
            </div>
            <div class="nav-actions">
                <button class="icon-btn" id="settingsNavBtn"><i class="fas fa-cog"></i></button>
            </div>
        </nav>

        <!-- সেটিংস প্যানেল -->
        <div class="settings-panel" id="settingsPanel">
            <div class="settings-header">
                <h3><i class="fas fa-sliders-h"></i> সেটিংস</h3>
                <button class="close-settings" id="closeSettingsBtn">&times;</button>
            </div>
            <div class="settings-body">
                <div class="setting-item">
                    <label><i class="fas fa-palette"></i> থিম নির্বাচন করুন</label>
                    <div class="theme-controls">
                        <button class="theme-btn active" data-theme="light">☀️ লাইট মোড</button>
                        <button class="theme-btn" data-theme="dark">🌙 ডার্ক মোড</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- মূল কন্টেন্ট - ইসলামিক অ্যাপস আইকন সহ -->
        <main class="main-content">
            <div class="welcome-section">
                <div class="welcome-icon">
                    <i class="fas fa-star-and-crescent"></i>
                </div>
                <h1>আসসালামু আলাইকুম</h1>
                <p>ইসলামিক অ্যাপসে আপনাকে স্বাগতম</p>
                <div class="current-time-box">
                    <i class="fas fa-clock"></i>
                    <span id="liveClock">--:--:-- --</span>
                </div>
            </div>

            <!-- ইসলামিক অ্যাপস ফিচার ব্যাজ -->
            <div class="app-badge">
                <i class="fas fa-quran"></i>
                <i class="fas fa-mosque"></i>
                <i class="fas fa-hands-praying"></i>
                <i class="fas fa-star-and-crescent"></i>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script>
        function updateClock() {
            let now = new Date();
            let clockSpan = document.getElementById("liveClock");
            if (clockSpan) {
                let hours = now.getHours();
                let minutes = now.getMinutes();
                let seconds = now.getSeconds();
                let ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12 || 12;
                clockSpan.innerHTML = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')} ${ampm}`;
            }
        }
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
